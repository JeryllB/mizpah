<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Mizpah Wellness Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f2ee;
}

/* CENTER CONTAINER */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* REGISTER CARD */
.card {
  width: 380px;
  background: white;
  padding: 40px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

.card h2 {
  font-family: 'Playfair Display', serif;
  color: #8b6b4a;
  margin-bottom: 5px;
}

.card p {
  font-size: 14px;
  color: #777;
  margin-bottom: 20px;
}

/* INPUT FIELDS */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(to right, #8b6b4a, #c2a27a);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* LOGIN LINK */
.login-link {
  margin-top: 15px;
  font-size: 14px;
}

.login-link a {
  color: #8b6b4a;
  font-weight: bold;
  text-decoration: none;
}

.login-link a:hover {
  text-decoration: underline;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .card {
    width: 90%;
  }
}
</style>

</head>

<body>

<div class="container">

  <div class="card">

    <h2>Create Account</h2>
    <p>Join Mizpah Wellness Spa</p>

    <form action="register.php" method="POST">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Register</button>

    </form>

    <div class="login-link">
      Already have an account?
      <a href="login.html">Login here</a>
    </div>

  </div>

</div>

</body>
</html>
