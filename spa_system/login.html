<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Mizpah Wellness Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.login-container {
  display: flex;
  height: 100vh;
}

.login-form {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f2ee;
}

.form-box {
  background: white;
  padding: 40px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  text-align: center;
}

.form-box h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 5px;
}

.form-box p {
  font-size: 14px;
  color: #777;
  margin-bottom: 20px;
}

.form-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

.form-box button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: linear-gradient(to right, #8b6b4a, #c2a27a);
  color: white;
  font-size: 16px;
}

.form-box button:hover {
  opacity: 0.9;
}

.register-link {
  margin-top: 15px;
  font-size: 14px;
}

.register-link a {
  color: #8b6b4a;
  font-weight: 600;
  text-decoration: none;
}

.login-image {
  flex: 1;
  background: url('images/logo.jpg');
  background-size: cover;
  background-position: center;
}

@media (max-width: 768px) {
  .login-container {
    flex-direction: column;
  }

  .login-image {
    height: 200px;
  }
}
</style>

</head>

<body>

<div class="login-container">

  <div class="login-form">

    <div class="form-box">

      <h2>Welcome Back</h2>
      <p>Login to continue your wellness journey</p>

      <form action="login.php" method="POST">

        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

      </form>

      <!-- REGISTER LINK -->
      <div class="register-link">
        <p>Don’t have an account?</p>
        <a href="register.html">Create account here →</a>
      </div>

    </div>

  </div>

  <div class="login-image"></div>

</div>

</body>
</html>
