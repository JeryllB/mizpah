<html lang="en">
<head>

<link rel="stylesheet" href="style.css">

<style>
.therapists {
  padding: 60px;
  text-align: center;
}

.therapist-container {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 30px;
}

.therapist-card {
  background: white;
  width: 250px;
  padding: 15px;
  border-radius: 15px;
  border: 1px solid #a07c5a;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.therapist-card img {
  width: 100%;
  border-radius: 10px;
}

.therapist-card h3 {
  margin: 10px 0 5px;
}

.rating {
  color: gold;
}

.specialty {
  font-size: 14px;
  margin-bottom: 10px;
}

.select-btn {
  display: inline-block;
  margin-top: 10px;
}
</style>

</head>

<body>

<header>
  <h2>Mizpah Wellness Spa</h2>
  <nav>

  </nav>
</header>

<section class="therapists">

  <h2>Meet Our Expert Therapists</h2>
  <p>Choose from our highly trained wellness professionals.</p>

  <div class="therapist-container">

    <div class="therapist-card">
      <img src="images/service1.jpg">
      <h3>Anna Reyes</h3>
      <p class="rating">⭐⭐⭐⭐⭐</p>
      <p class="specialty">Swedish & Relaxation</p>
      <a href="booking.html" class="btn-primary select-btn">Select</a>

    <div class="therapist-card">

</section>
