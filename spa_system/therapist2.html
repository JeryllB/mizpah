<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marcus Santos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.profile {
  max-width: 1100px;
  margin: auto;
  padding: 40px;
}

.profile-card {
  display: flex;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.profile-img { flex: 1; }
.profile-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-info {
  flex: 1.5;
  padding: 30px;
}

.stats {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.badge {
  background: #f3e9dc;
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 13px;
}

.section { margin-top: 20px; }

.section h3 {
  border-left: 5px solid #a07c5a;
  padding-left: 10px;
}

.rating-box {
  background: #f3e9dc;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}

.book-btn {
  display: block;
  text-align: center;
  margin-top: 15px;
  background: linear-gradient(to right, #8b6b4a, #c2a27a);
  color: white;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
}

.review {
  background: #f9f5f1;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

@media (max-width:768px){
  .profile-card { flex-direction: column; }
}
</style>
</head>

<body>

<header class="header-top">
  <div class="header-left">
    <a href="therapists.html">← Back</a>
    <h2>Mizpah Wellness Spa</h2>
  </div>
</header>

<div class="profile">

<div class="profile-card">

<div class="profile-img">
<img src="images/marcus.jpg">
</div>

<div class="profile-info">
<h2>Anna Reyes</h2>

<div class="stats">
<span class="badge">8 years</span>
<span class="badge">98 reviews</span>
</div>

<div class="section">
<h3>Professional Credentials</h3>
<p>Sports Massage Therapist</p>
<p>Trigger Point Therapy</p>
</div>

<div class="section">
<h3>Specialization</h3>
<p>Sports Massage</p>
<p>Injury Recovery</p>
</div>

<div class="section">
<h3>About</h3>
<p>Specializes in sports recovery and rehabilitation.</p>
</div>

<div class="rating-box">
<h2>4.8 / 5</h2>
<p>98 reviews</p>
</div>

<a href="booking.html" class="book-btn">Book Appointment</a>

</div>

</div>
</div>

</body>
</html>
