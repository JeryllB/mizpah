<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment - Mizpah Wellness Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.payment-container {
  display: flex;
  gap: 30px;
  padding: 50px;
  max-width: 1100px;
  margin: auto;
}

.payment-left {
  flex: 2;
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.payment-right {
  flex: 1;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  height: fit-content;
}

.section-title {
  background: linear-gradient(to right, #8b6b4a, #c2a27a);
  color: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.option-box {
  border: 1px solid #ddd;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.option-box input {
  margin-right: 10px;
}

.complete-btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(to right, #8b6b4a, #c2a27a);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.summary p {
  margin: 10px 0;
}

.total {
  font-size: 26px;
  color: #a07c5a;
  margin-top: 10px;
}

.status {
  margin-top: 20px;
  background: #f3e9dc;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

@media (max-width: 768px) {
  .payment-container {
    flex-direction: column;
  }
}
</style>

</head>

<body>

<header>
  <h2>Mizpah Wellness Spa</h2>
  <nav>
    <a href="booking.html">← Back to Booking</a>
  </nav>
</header>

<div class="payment-container">

  <!-- LEFT SIDE -->
  <div class="payment-left">

    <div class="section-title">Payment Options</div>

    <div class="option-box">
      <label>
        <input type="radio" name="payment" value="gcash" checked>
        GCash Payment
      </label>
    </div>

    <div class="option-box">
      <label>
        <input type="radio" name="payment" value="spa">
        Pay at Spa
      </label>
    </div>

    <button class="complete-btn" onclick="completePayment()">
      Complete Payment
    </button>

  </div>

  <!-- RIGHT SIDE -->
  <div class="payment-right">

    <div class="section-title">Booking Summary</div>

    <div class="summary">
      <p><strong>Service</strong><br>Booking Saved Successfully</p>
      <p><strong>Status</strong><br>Pending Payment</p>

      <div class="total">₱0</div>

      <div class="status">Please complete your payment</div>
    </div>

  </div>

</div>

<script>
function completePayment() {
  const selected = document.querySelector('input[name="payment"]:checked').value;

  if (selected === "gcash") {
    alert("Redirecting to GCash...");
  } else {
    alert("Booking Confirmed! Please pay at the spa.");
  }

  // redirect back to homepage
  window.location.href = "index.html";
}
</script>

</body>
</html>
