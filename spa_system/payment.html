<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment - Mizpah Wellness Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

.payment {
  padding: 60px;
  text-align: center;
}

.payment-box {
  background: white;
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
  border: 1px solid #a07c5a;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* OPTIONS */
.payment-options {
  display: flex;
  justify-content: space-around;
  margin: 20px 0;
}

.payment-options button {
  padding: 10px 15px;
  border-radius: 8px;
  border: 1px solid #a07c5a;
  background: transparent;
  cursor: pointer;
}

/* ACTIVE OPTION */
.payment-options button.active {
  background: #a07c5a;
  color: white;
}

/* FORM */
.payment-form {
  text-align: left;
}

.payment-form input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* QR */
.qr-box {
  display: none;
  text-align: center;
}

.qr-box img {
  width: 200px;
  margin: 10px 0;
}

/* SUCCESS */
.success {
  display: none;
  text-align: center;
}

.success h2 {
  color: green;
}

</style>
</head>

<body>

<header>
  <h2>Mizpah Wellness Spa</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
  </nav>
</header>

<section class="payment">

  <h2>Complete Your Payment</h2>
  <p>Select your preferred payment method</p>

  <div class="payment-box">

    <!-- OPTIONS -->
    <div class="payment-options">
      <button onclick="showMethod('card')" class="active">Card</button>
      <button onclick="showMethod('gcash')">GCash</button>
      <button onclick="showMethod('spa')">Pay at Spa</button>
    </div>

    <!-- CARD FORM -->
    <div class="payment-form" id="card">
      <input type="text" placeholder="Cardholder Name">
      <input type="text" placeholder="Card Number">
      <input type="text" placeholder="MM/YY">
      <input type="text" placeholder="CVV">
    </div>

    <!-- GCASH -->
    <div class="qr-box" id="gcash">
      <p>Scan QR to Pay</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=GCASH-DEMO">
      <input type="file">
    </div>

    <!-- PAY AT SPA -->
    <div class="qr-box" id="spa">
      <p>You can pay at the spa upon arrival.</p>
    </div>

    <button class="btn-primary" onclick="payNow()">Confirm Payment</button>

    <!-- SUCCESS -->
    <div class="success" id="success">
      <h2>✅ Payment Successful!</h2>
      <p>Your appointment has been booked.</p>
    </div>

  </div>

</section>

<script>
function showMethod(method) {
  document.getElementById("card").style.display = "none";
  document.getElementById("gcash").style.display = "none";
  document.getElementById("spa").style.display = "none";

  document.getElementById(method).style.display = "block";

  let buttons = document.querySelectorAll(".payment-options button");
  buttons.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

function payNow() {
  document.getElementById("success").style.display = "block";
}
</script>

</body>
</html>
