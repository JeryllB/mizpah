<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment - Mizpah Wellness Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.payment {
  padding: 60px;
  text-align: center;
}

.payment-box {
  background: white;
  max-width: 450px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
  border: 1px solid #a07c5a;
}

.payment-options {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px 0;
}

.payment-options button {
  padding: 10px 15px;
  border-radius: 8px;
  border: 1px solid #a07c5a;
  background: transparent;
  cursor: pointer;
}

.payment-options button.active {
  background: #a07c5a;
  color: white;
}

.method {
  display: none;
}

.qr img {
  width: 180px;
  margin: 15px 0;
}

.success {
  display: none;
  margin-top: 20px;
}

.success h3 {
  color: green;
}
</style>
</head>

<body>

<header>
  <h2>Mizpah Wellness Spa</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
  </nav>
</header>

<section class="payment">

  <h2>Complete Your Payment</h2>
  <p>Select your payment method</p>

  <div class="payment-box">

    <div class="payment-options">
      <button class="active" onclick="showMethod('gcash', this)">GCash</button>
      <button onclick="showMethod('cash', this)">Cash</button>
    </div>

    <div id="gcash" class="method" style="display:block;">
      <div class="qr">
        <p>Scan to pay via GCash</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=GCASH">
      </div>
    </div>

    <div id="cash" class="method">
      <p>You can pay at the spa upon arrival.</p>
    </div>

    <button class="btn-primary" onclick="payNow()">Confirm Payment</button>

    <div class="success" id="success">
      <h3>Payment Successful</h3>
      <p>Your booking is confirmed</p>
    </div>

  </div>

</section>

<script>
function showMethod(id, btn){
  document.getElementById('gcash').style.display='none';
  document.getElementById('cash').style.display='none';
  document.getElementById(id).style.display='block';

  let buttons=document.querySelectorAll('.payment-options button');
  buttons.forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function payNow(){
  document.getElementById('success').style.display='block';
}
</script>

</body>
</html>
